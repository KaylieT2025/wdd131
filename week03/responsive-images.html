<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Kaylie Tapia">
    <meta name="description" content="A web page to practice responsive images for week 3 of WDD 131.">
    <title>Reponsive Images</title>
</head>
<body>

    <main>
        <div class="hero">
            <picture>
                <source srcset="images/hero-large.webp" media="(min-width: 1000px)">
                <source srcset="images/hero-medium.webp" media="(min-width: 500px)">
                <img src="images/hero-small.webp" alt="Mesa Arizona temple" width="1500px" height="500px">
            </picture>
        </div>
    </main>
    
</body>
</html>
