<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Kaylie Tapia">
    <meta name="description" content="A country page project for week 3 for class WDD 131.">
    <title>Counrtry</title>
    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css">
    <script src="scripts/place.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>
<body>

    <header>
        <h1>Georgia, USA</h1>

    </header>

    <main>
        <picture>
            <source srcset="images/place-hero-large.webp" media="(min-width: 768px)">
            <img src="images/place-hero.webp" alt="Image of Georgia place holder.">
        </picture>
        <div class="card-container">
            <div class="card1">
                <h2>Data</h2>
            
                <h3>Area:</h3>
                <p>59,425 mi²</p>

                <h3>Population:</h3>
                <p>11,302,748</p>

                <h3>Capital:</h3>
                <p>Atlanta</p>

                <h3>Language:</h3>
                <p>English</p>

                <h3>Currency:</h3>
                <p>United States Dollars</p>

                <h3>Timezone:</h3>
                <p>UTC-4</p>

                <h3>Calling Code:</h3>
                <p>+1</p>

                <h3>Internet TLD:</h3>
                <p>.us</p>
            </div>

            <div class="card2">
                <h2>Weather</h2>

                <!--Weather icons inculding svg and emoji.-->
                
                    <svg class="weather-icon" xmlns="http://www.w3.org/2000/svg" width="100" height="100" fill="currentColor" class="bi bi-cloud-haze-fill"
                        viewBox="0 0 16 16">
                        <path
                            d="M4 11.5a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5m-3 2a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5m2 2a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5M13.405 4.027a5.001 5.001 0 0 0-9.499-1.004A3.5 3.5 0 1 0 3.5 10H13a3 3 0 0 0 .405-5.973" />
                    </svg>
                

                <p>Temperature: <span id="temp">27</span>℃</p>
                <p>Wind Speed: <span id="wind">15</span>km/h</p>
                <p>Wind Chill: <span id="chill"></span></p>

            </div>
        </div>


    </main>

    <footer>
        <p>&copy; <span id="current-year"></span>🥞 Kaylie Tapia 🥞 Georgia, USA 🥞</p>
        <p id="lastModified"></p>

    </footer>
    
</body>
</html>
