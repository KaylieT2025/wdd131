<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Kaylie Tapia">
    <meta name="description" content="WDD 131 assignment for week 5 for form about product reviews.">
    <script src="scripts/form.js" defer></script>
    <link rel="stylesheet" href="styles/form.css">
    <title>HTML Forms</title>
</head>

<body>
    <header>

    </header>

    <main>

        <h1>Product Review</h1>

        <form method="get" action="review.html">

            <label for="productName">Product Name<span class="required">*</span></label>
            <select id="productName" name="productName" required>
                <option value="" disabled selected>Select a product...</option>
            </select>
            
            <fieldset class="rating">
                <label>Overall Rating<span class="required">*</span></label>
                <input type="radio" name="rating" value="1" id="rating1" required>
                <label for="rating1">☆</label>
                <input type="radio" name="rating" value="2" id="rating2" required>
                <label for="rating2">☆☆</label>
                <input type="radio" name="rating" value="3" id="rating3" required>
                <label for="rating3">☆☆☆</label>
                <input type="radio" name="rating" value="4" id="rating4" required>
                <label for="rating4">☆☆☆☆</label>
                <input type="radio" name="rating" value="5" id="rating5" required>
                <label for="rating5">☆☆☆☆☆</label>
            </fieldset>

            <label for="installDate">Date of Installation<span class="required">*</span></label>
            <input type="date" id="installDate" name="installDate" required>

            <label>Which feature did you find useful? (Check all that apply.)</label>
            <input type="checkbox" id="feature1" name="usefulFeature" value="durabilty">
            <label for="feature1">Durability</label>
            <input type="checkbox" id="feature2" name="usefulFeature" value="easeOfUse">
            <label for="feature2">Ease of Use</label>
            <input type="checkbox" id="feature3" name="usefulFeature" value="preformance">
            <label for="feature3">Performance</label>
            <input type="checkbox" id="feature4" name="usefulFeature" value="design">
            <label for="feature4">Design</label>

            <label for="writtenReview">Written Review (Optional)</label>
            <textarea id="writtenReview" name="writtenReview"></textarea>

            <label for="userName">Your Name (Optional)</label>
            <input type="text" id="userName" name="userName">

            <input type="submit" value="Submit Review">
        </form>

    </main>

    <footer>

        <p>&copy; <span id="current-year"></span>🥞 Kaylie Tapia 🥞 Georgia, USA 🥞</p>
        <p id="lastModified"></p>
    </footer>

</body>

</html>
